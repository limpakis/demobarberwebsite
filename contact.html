<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Top Boy Barber Shop | Contact</title>
    <meta
      name="description"
      content="Top Boy Barber Shop contact page with Google Maps location and direct links."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="page-shell page-contact">
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-grid"></div>

    <header class="site-header">
      <div class="container nav-wrap">
        <a href="index.html" class="brand" aria-label="Top Boy Barber Shop Home">
          <span class="brand-mark"><img src="assets/topboylogo.png" alt="Top Boy logo" loading="eager" /></span>
          <span class="brand-text">
            Top Boy
            <small>Barber Shop</small>
          </span>
        </a>
        <nav class="nav-links" aria-label="Main navigation">
          <a href="index.html">Home</a>
          <a href="contact.html">Contact</a>

        </nav>
        <a class="btn btn-small" href="book.html#booking-start">Book Now</a>
      </div>
    </header>

    <main>
      <section class="section">
        <div class="container contact-grid">
          <div class="reveal">
            <p class="eyebrow">Contact</p>
            <h1>
              Find
              <span class="headline-accent">Top Boy Barber Shop</span>
              instantly.
            </h1>
            <p class="hero-sub">
              Athinodorou 11, Kato Petralona. Open the map, message on Instagram, or call directly.
            </p>
            <div class="contact-cards">
              <a href="https://maps.app.goo.gl/6EDn6z3AVSyHkoYm9?g_st=com.google.maps.preview.copy" target="_blank" rel="noreferrer">Google Maps</a>
              <a href="https://www.instagram.com/topboy_barber_shop" target="_blank" rel="noreferrer">Instagram</a>
              <a href="tel:+306973617587">Call Now</a>
            </div>
            <div class="hero-actions">
              <a class="btn" href="book.html#booking-start">Go to Booking</a>
            </div>
          </div>

          <div class="map-wrap reveal magnetic-card">
            <iframe
              title="Top Boy Barber Shop Google Map"
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"
              src="https://www.google.com/maps?q=Top+boy+barber,+%CE%91%CE%B8%CE%B7%CE%BD%CE%BF%CE%B4%CF%8E%CF%81%CE%BF%CF%85+11,+%CE%91%CE%B8%CE%AE%CE%BD%CE%B1+118+53&output=embed"
            ></iframe>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-wrap">
        <p>© <span id="year"></span> Top Boy Barber Shop · Contact</p>
        <a href="index.html">Top Boy Home ↑</a>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
