<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Top Boy Barber Shop | Thank You</title>
    <meta
      name="description"
      content="Top Boy Barber Shop booking confirmation page."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="page-shell page-thank-you">
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-grid"></div>
    <div class="bg-photo" aria-hidden="true"></div>

    <header class="site-header">
      <div class="container nav-wrap">
        <a href="index.html" class="brand" aria-label="Top Boy Barber Shop Home">
          <span class="brand-mark"><img src="assets/topboylogo.png" alt="Top Boy logo" loading="eager" /></span>
          <span class="brand-text">
            Top Boy
            <small>Barber Shop</small>
          </span>
        </a>
        <nav class="nav-links" aria-label="Main navigation">
          <a href="index.html">Home</a>
          <a href="contact.html">Contact</a>
        </nav>
        <a class="btn btn-small" href="book.html#booking-start">Book Again</a>
      </div>
    </header>

    <main>
      <section class="section">
        <div class="container hero-grid">
          <div class="hero-copy reveal">
            <p class="eyebrow">Booking Confirmed</p>
            <h1>
              Thank you,
              <span class="headline-accent" id="thankYouName">client</span>.
            </h1>
            <p class="hero-sub">
              Your appointment request has been saved for Top Boy Barber Shop.
            </p>
            <div class="hero-actions">
              <a class="btn" href="book.html#booking-start">Book Another</a>
              <a class="btn btn-ghost" href="index.html">Back Home</a>
            </div>
          </div>

          <div class="hero-card reveal magnetic-card">
            <div class="card-badge">Appointment Details</div>
            <p><strong>Service:</strong> <span id="thankYouService">-</span></p>
            <p><strong>Date:</strong> <span id="thankYouDate">-</span></p>
            <p><strong>Time:</strong> <span id="thankYouTime">-</span></p>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-wrap">
        <p>© <span id="year"></span> Top Boy Barber Shop · Thank You</p>
        <a href="index.html">Top Boy Home ↑</a>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
